<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LOGICMINE — 論理マインスイーパー</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface2: #21262d;
    --border: #30363d;
    --accent: #58a6ff;
    --accent2: #3fb950;
    --danger: #f85149;
    --warn: #d29922;
    --text: #c9d1d9;
    --text-dim: #8b949e;
    --text-muted: #484f58;
    --cell-closed: #1f2937;
    --cell-open: #0d1117;
    --cell-hover: #253048;
    --shadow: 0 8px 32px rgba(0,0,0,0.6);
    --radius: 6px;
    --num1: #58a6ff; --num2: #3fb950; --num3: #f85149;
    --num4: #8b5cf6; --num5: #f97316; --num6: #06b6d4;
    --num7: #ec4899; --num8: #a3a3a3;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px 48px;
    user-select: none;
  }

  /* Header */
  header {
    width: 100%;
    max-width: 900px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 28px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--border);
  }

  .logo {
    font-family: 'JetBrains Mono', monospace;
    font-weight: 700;
    font-size: 22px;
    letter-spacing: -0.5px;
    color: var(--text);
  }

  .logo span { color: var(--accent); }

  .status-bar {
    display: flex;
    gap: 24px;
    align-items: center;
  }

  .stat {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
  }

  .stat-label {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--text-muted);
  }

  .stat-value {
    font-family: 'JetBrains Mono', monospace;
    font-size: 20px;
    font-weight: 600;
    color: var(--text);
    min-width: 40px;
    text-align: center;
  }

  .stat-value.danger { color: var(--danger); }
  .stat-value.success { color: var(--accent2); }

  /* Controls */
  .controls {
    display: flex;
    gap: 10px;
    align-items: center;
    flex-wrap: wrap;
    justify-content: center;
    margin-bottom: 24px;
  }

  .btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 500;
    padding: 8px 16px;
    border-radius: var(--radius);
    cursor: pointer;
    transition: all 0.15s ease;
    letter-spacing: 0.2px;
  }

  .btn:hover { background: var(--cell-hover); border-color: var(--accent); color: var(--accent); }
  .btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

  .btn-danger:hover { border-color: var(--danger); color: var(--danger); }
  .btn-danger.active { background: var(--danger); border-color: var(--danger); color: #fff; }

  .sep { width: 1px; height: 28px; background: var(--border); }

  .mode-indicator {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 14px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    font-size: 13px;
    font-weight: 500;
  }

  .mode-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--accent);
    transition: background 0.2s;
  }

  .mode-indicator.flag-mode .mode-dot { background: var(--warn); }
  .mode-indicator.flag-mode { border-color: var(--warn); color: var(--warn); }

  /* Board */
  .board-wrap {
    position: relative;
    display: inline-block;
  }

  #board {
    display: grid;
    gap: 2px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px;
    box-shadow: var(--shadow);
    transition: opacity 0.3s;
  }

  /* Cells */
  .cell {
    width: 36px;
    height: 36px;
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    position: relative;
    transition: background 0.12s, transform 0.08s, box-shadow 0.12s;
    border: 1px solid transparent;
  }

  .cell.closed {
    background: var(--cell-closed);
    border-color: #2d3748;
    box-shadow: 0 1px 0 rgba(255,255,255,0.05) inset, 0 1px 2px rgba(0,0,0,0.3);
  }

  .cell.closed:hover {
    background: var(--cell-hover);
    border-color: var(--accent);
    transform: scale(1.05);
    box-shadow: 0 0 8px rgba(88,166,255,0.2);
    z-index: 1;
  }

  .cell.open {
    background: var(--cell-open);
    border-color: #1c2333;
    cursor: default;
  }

  .cell.flagged {
    background: rgba(210,153,34,0.12);
    border-color: var(--warn);
    color: var(--warn);
  }

  .cell.flagged:hover {
    background: rgba(210,153,34,0.2);
    transform: scale(1.05);
    z-index: 1;
  }

  .cell.mine-hit {
    background: rgba(248,81,73,0.25);
    border-color: var(--danger);
    animation: shake 0.4s ease;
  }

  .cell.mine-revealed {
    background: rgba(248,81,73,0.1);
    border-color: #2d1b1b;
    color: var(--danger);
  }

  .cell.hint {
    animation: hint-pulse 1s ease 2;
  }

  @keyframes hint-pulse {
    0%, 100% { box-shadow: none; }
    50% { box-shadow: 0 0 12px rgba(88,166,255,0.6), 0 0 0 2px var(--accent); border-color: var(--accent); }
  }

  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20% { transform: translateX(-4px); }
    40% { transform: translateX(4px); }
    60% { transform: translateX(-3px); }
    80% { transform: translateX(3px); }
  }

  /* Ripple open animation */
  .cell.opening {
    animation: cell-open 0.25s ease forwards;
  }

  @keyframes cell-open {
    0% { transform: scale(1); background: var(--cell-hover); }
    50% { transform: scale(0.9); }
    100% { transform: scale(1); }
  }

  /* Number colors */
  .n1 { color: var(--num1); }
  .n2 { color: var(--num2); }
  .n3 { color: var(--num3); }
  .n4 { color: var(--num4); }
  .n5 { color: var(--num5); }
  .n6 { color: var(--num6); }
  .n7 { color: var(--num7); }
  .n8 { color: var(--num8); }

  /* Overlay */
  .overlay {
    display: none;
    position: absolute;
    inset: 0;
    border-radius: 10px;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 16px;
    z-index: 10;
    backdrop-filter: blur(6px);
  }

  .overlay.show { display: flex; }

  .overlay-win { background: rgba(13,17,23,0.88); }
  .overlay-lose { background: rgba(13,17,23,0.88); }

  .overlay-title {
    font-family: 'JetBrains Mono', monospace;
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.5px;
  }

  .overlay-win .overlay-title { color: var(--accent2); }
  .overlay-lose .overlay-title { color: var(--danger); }

  .overlay-sub {
    font-size: 14px;
    color: var(--text-dim);
    text-align: center;
    line-height: 1.5;
  }

  .overlay .btn { font-size: 14px; padding: 10px 24px; }

  /* Difficulty dots */
  .diff-btn {
    position: relative;
  }

  .diff-btn::after {
    content: attr(data-mines);
    position: absolute;
    top: -8px;
    right: -6px;
    font-size: 10px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1px 5px;
    color: var(--text-muted);
    font-family: 'JetBrains Mono', monospace;
    font-weight: 600;
  }

  /* Info bar */
  .info-bar {
    margin-top: 20px;
    display: flex;
    gap: 20px;
    align-items: center;
    font-size: 12px;
    color: var(--text-muted);
  }

  .info-item {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  kbd {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 2px 7px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text);
    min-width: 28px;
  }

  /* Timer */
  #timer {
    font-family: 'JetBrains Mono', monospace;
    font-size: 20px;
    font-weight: 600;
    color: var(--text);
    min-width: 54px;
    text-align: center;
  }

  /* Progress bar */
  .progress-wrap {
    width: 100%;
    max-width: 900px;
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    margin-bottom: 20px;
    overflow: hidden;
  }

  #progress-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 2px;
    transition: width 0.3s ease;
    width: 0%;
  }

  /* Chord highlight */
  .cell.chord-ready {
    box-shadow: 0 0 0 2px var(--accent2);
  }
</style>
</head>
<body>

<header>
  <div class="logo">LOGIC<span>MINE</span></div>
  <div class="status-bar">
    <div class="stat">
      <div class="stat-label">Mines</div>
      <div class="stat-value danger" id="mine-count">—</div>
    </div>
    <div class="stat">
      <div class="stat-label">Time</div>
      <div id="timer">0:00</div>
    </div>
    <div class="stat">
      <div class="stat-label">Open</div>
      <div class="stat-value success" id="open-count">0</div>
    </div>
  </div>
</header>

<div class="progress-wrap"><div id="progress-bar"></div></div>

<div class="controls">
  <button class="btn diff-btn active" id="d-easy" data-mines="10" onclick="setDifficulty('easy')">Easy 9×9</button>
  <button class="btn diff-btn" id="d-medium" data-mines="40" onclick="setDifficulty('medium')">Medium 16×16</button>
  <button class="btn diff-btn" id="d-hard" data-mines="99" onclick="setDifficulty('hard')">Hard 30×16</button>
  <div class="sep"></div>
  <div class="mode-indicator" id="mode-indicator">
    <div class="mode-dot"></div>
    <span id="mode-text">Open mode</span>
  </div>
  <button class="btn" onclick="toggleFlag()" title="F key">🚩 Flag (F)</button>
  <div class="sep"></div>
  <button class="btn" onclick="getHint()" title="H key">💡 Hint (H)</button>
  <button class="btn btn-danger" onclick="newGame()">↺ New</button>
</div>

<div class="board-wrap">
  <div id="board"></div>
  <div class="overlay overlay-win" id="overlay-win">
    <div class="overlay-title">🎉 クリア！</div>
    <div class="overlay-sub" id="win-msg"></div>
    <button class="btn" onclick="newGame()">もう一度</button>
  </div>
  <div class="overlay overlay-lose" id="overlay-lose">
    <div class="overlay-title">💥 爆発</div>
    <div class="overlay-sub">でも大丈夫。このパズルは論理で解けます。</div>
    <button class="btn" onclick="newGame()">再挑戦</button>
  </div>
</div>

<div class="info-bar">
  <div class="info-item"><kbd>Click</kbd> セルを開く</div>
  <div class="info-item"><kbd>Right</kbd> フラグ</div>
  <div class="info-item"><kbd>F</kbd> フラグ切替</div>
  <div class="info-item"><kbd>H</kbd> ヒント</div>
  <div class="info-item"><kbd>Middle</kbd> コード（自動展開）</div>
</div>

<script>
// ===================== Game State =====================
const CONFIGS = {
  easy:   { rows: 9,  cols: 9,  mines: 10 },
  medium: { rows: 16, cols: 16, mines: 40 },
  hard:   { rows: 16, cols: 30, mines: 99 },
};

let cfg, grid, revealed, flagged, gameState, firstClick, timerInt, elapsedSecs, flagMode;
let currentDiff = 'easy';

function init(diff) {
  currentDiff = diff;
  cfg = { ...CONFIGS[diff] };
  grid = [];
  revealed = [];
  flagged = [];
  gameState = 'idle'; // idle | playing | won | lost
  firstClick = true;
  elapsedSecs = 0;
  flagMode = false;
  clearInterval(timerInt);

  for (let r = 0; r < cfg.rows; r++) {
    grid.push(new Array(cfg.cols).fill(0));
    revealed.push(new Array(cfg.cols).fill(false));
    flagged.push(new Array(cfg.cols).fill(false));
  }

  document.getElementById('mine-count').textContent = cfg.mines;
  document.getElementById('open-count').textContent = '0';
  document.getElementById('timer').textContent = '0:00';
  document.getElementById('progress-bar').style.width = '0%';
  document.getElementById('overlay-win').classList.remove('show');
  document.getElementById('overlay-lose').classList.remove('show');
  updateModeUI();
  renderBoard();
}

// ===================== Mine Placement (solvable) =====================
function placeMines(safeR, safeC) {
  const safeCells = new Set();
  for (let dr = -1; dr <= 1; dr++)
    for (let dc = -1; dc <= 1; dc++) {
      const nr = safeR + dr, nc = safeC + dc;
      if (nr >= 0 && nr < cfg.rows && nc >= 0 && nc < cfg.cols)
        safeCells.add(nr * cfg.cols + nc);
    }

  let placed = 0, attempts = 0;
  while (placed < cfg.mines && attempts < 10000) {
    const r = Math.floor(Math.random() * cfg.rows);
    const c = Math.floor(Math.random() * cfg.cols);
    if (grid[r][c] !== -1 && !safeCells.has(r * cfg.cols + c)) {
      grid[r][c] = -1;
      placed++;
    }
    attempts++;
  }
  calcNumbers();
}

function calcNumbers() {
  for (let r = 0; r < cfg.rows; r++)
    for (let c = 0; c < cfg.cols; c++) {
      if (grid[r][c] === -1) continue;
      let count = 0;
      for (let dr = -1; dr <= 1; dr++)
        for (let dc = -1; dc <= 1; dc++) {
          const nr = r + dr, nc = c + dc;
          if (nr >= 0 && nr < cfg.rows && nc >= 0 && nc < cfg.cols && grid[nr][nc] === -1)
            count++;
        }
      grid[r][c] = count;
    }
}

// ===================== Reveal Logic =====================
function revealCell(r, c, animate = true) {
  if (r < 0 || r >= cfg.rows || c < 0 || c >= cfg.cols) return;
  if (revealed[r][c] || flagged[r][c]) return;

  if (firstClick) {
    placeMines(r, c);
    firstClick = false;
    gameState = 'playing';
    startTimer();
  }

  if (grid[r][c] === -1) {
    revealed[r][c] = true;
    gameState = 'lost';
    stopTimer();
    revealAllMines(r, c);
    renderBoard();
    setTimeout(() => document.getElementById('overlay-lose').classList.add('show'), 600);
    return;
  }

  // BFS flood fill
  const queue = [[r, c]];
  const visited = new Set([r * cfg.cols + c]);

  while (queue.length > 0) {
    const [cr, cc] = queue.shift();
    if (revealed[cr][cc]) continue;
    revealed[cr][cc] = true;
    if (grid[cr][cc] === 0) {
      for (let dr = -1; dr <= 1; dr++)
        for (let dc = -1; dc <= 1; dc++) {
          const nr = cr + dr, nc = cc + dc;
          const key = nr * cfg.cols + nc;
          if (nr >= 0 && nr < cfg.rows && nc >= 0 && nc < cfg.cols
            && !visited.has(key) && !revealed[nr][nc] && !flagged[nr][nc]) {
            visited.add(key);
            queue.push([nr, nc]);
          }
        }
    }
  }

  checkWin();
  renderBoard(animate ? [...visited] : null);
}

function chordReveal(r, c) {
  if (!revealed[r][c] || grid[r][c] <= 0) return;
  let flagCount = 0;
  const neighbors = [];
  for (let dr = -1; dr <= 1; dr++)
    for (let dc = -1; dc <= 1; dc++) {
      if (dr === 0 && dc === 0) continue;
      const nr = r + dr, nc = c + dc;
      if (nr >= 0 && nr < cfg.rows && nc >= 0 && nc < cfg.cols) {
        if (flagged[nr][nc]) flagCount++;
        else neighbors.push([nr, nc]);
      }
    }
  if (flagCount === grid[r][c]) {
    neighbors.forEach(([nr, nc]) => revealCell(nr, nc));
  }
}

function revealAllMines(hitR, hitC) {
  for (let r = 0; r < cfg.rows; r++)
    for (let c = 0; c < cfg.cols; c++)
      if (grid[r][c] === -1) revealed[r][c] = true;
}

function checkWin() {
  let openCount = 0;
  for (let r = 0; r < cfg.rows; r++)
    for (let c = 0; c < cfg.cols; c++)
      if (revealed[r][c] && grid[r][c] !== -1) openCount++;

  const total = cfg.rows * cfg.cols - cfg.mines;
  document.getElementById('open-count').textContent = openCount;
  document.getElementById('progress-bar').style.width = (openCount / total * 100) + '%';

  if (openCount === total) {
    gameState = 'won';
    stopTimer();
    const mins = Math.floor(elapsedSecs / 60);
    const secs = elapsedSecs % 60;
    document.getElementById('win-msg').textContent =
      `${cfg.rows}×${cfg.cols} / 地雷${cfg.mines}個 / ${mins}:${String(secs).padStart(2,'0')}`;
    setTimeout(() => document.getElementById('overlay-win').classList.add('show'), 300);
  }
}

// ===================== Hint System =====================
function getHint() {
  if (gameState !== 'playing' || firstClick) return;

  // Strategy 1: find a safe cell that's logically deducible
  for (let r = 0; r < cfg.rows; r++) {
    for (let c = 0; c < cfg.cols; c++) {
      if (!revealed[r][c] || grid[r][c] <= 0) continue;
      const neighbors = getNeighbors(r, c);
      const unrev = neighbors.filter(([nr,nc]) => !revealed[nr][nc]);
      const flags = neighbors.filter(([nr,nc]) => flagged[nr][nc]);
      const hidden = unrev.filter(([nr,nc]) => !flagged[nr][nc]);

      // All unrevealed are mines
      if (hidden.length > 0 && flags.length + hidden.length === grid[r][c]) {
        // Hint: these are mines → flash them
        highlightCells(hidden, 'hint');
        return;
      }

      // All mines accounted for → remaining safe
      if (flags.length === grid[r][c] && hidden.length > 0) {
        highlightCells(hidden, 'hint');
        return;
      }
    }
  }

  // Strategy 2: constraint intersection
  const safe = findSafeBySolver();
  if (safe.length > 0) {
    highlightCells([safe[0]], 'hint');
    return;
  }

  // Fallback: highlight a random unrevealed non-mine
  const candidates = [];
  for (let r = 0; r < cfg.rows; r++)
    for (let c = 0; c < cfg.cols; c++)
      if (!revealed[r][c] && !flagged[r][c] && grid[r][c] !== -1)
        candidates.push([r, c]);
  if (candidates.length > 0) {
    const pick = candidates[Math.floor(Math.random() * Math.min(5, candidates.length))];
    highlightCells([pick], 'hint');
  }
}

function findSafeBySolver() {
  // Simple constraint solver: for each pair of revealed cells, find subset constraints
  const safe = [];
  const constraints = [];

  for (let r = 0; r < cfg.rows; r++)
    for (let c = 0; c < cfg.cols; c++) {
      if (!revealed[r][c] || grid[r][c] <= 0) continue;
      const neighbors = getNeighbors(r, c);
      const flags = neighbors.filter(([nr,nc]) => flagged[nr][nc]).length;
      const hidden = neighbors.filter(([nr,nc]) => !revealed[nr][nc] && !flagged[nr][nc]);
      if (hidden.length > 0)
        constraints.push({ cells: hidden.map(([r,c]) => r*cfg.cols+c), mines: grid[r][c] - flags });
    }

  // If constraint A is a subset of constraint B, the difference is solvable
  for (let i = 0; i < constraints.length; i++) {
    for (let j = 0; j < constraints.length; j++) {
      if (i === j) continue;
      const a = constraints[i], b = constraints[j];
      const aSet = new Set(a.cells);
      const bSet = new Set(b.cells);
      if ([...aSet].every(x => bSet.has(x)) && aSet.size < bSet.size) {
        const diff = b.cells.filter(x => !aSet.has(x));
        const minesDiff = b.mines - a.mines;
        if (minesDiff === 0) {
          // diff cells are safe
          diff.forEach(key => safe.push([Math.floor(key / cfg.cols), key % cfg.cols]));
        }
      }
    }
  }
  return safe;
}

function highlightCells(cells, cls) {
  cells.forEach(([r, c]) => {
    const el = document.querySelector(`[data-r="${r}"][data-c="${c}"]`);
    if (!el) return;
    el.classList.remove(cls);
    void el.offsetWidth;
    el.classList.add(cls);
    setTimeout(() => el.classList.remove(cls), 2100);
  });
}

function getNeighbors(r, c) {
  const result = [];
  for (let dr = -1; dr <= 1; dr++)
    for (let dc = -1; dc <= 1; dc++) {
      if (dr === 0 && dc === 0) continue;
      const nr = r + dr, nc = c + dc;
      if (nr >= 0 && nr < cfg.rows && nc >= 0 && nc < cfg.cols)
        result.push([nr, nc]);
    }
  return result;
}

// ===================== Render =====================
function renderBoard(openedKeys = null) {
  const board = document.getElementById('board');
  board.style.gridTemplateColumns = `repeat(${cfg.cols}, 36px)`;

  const openedSet = openedKeys ? new Set(openedKeys) : null;

  if (!board.children.length || board.children.length !== cfg.rows * cfg.cols) {
    board.innerHTML = '';
    for (let r = 0; r < cfg.rows; r++) {
      for (let c = 0; c < cfg.cols; c++) {
        const cell = document.createElement('div');
        cell.className = 'cell closed';
        cell.dataset.r = r;
        cell.dataset.c = c;
        cell.addEventListener('click', onCellClick);
        cell.addEventListener('contextmenu', onCellRight);
        cell.addEventListener('auxclick', onCellMiddle);
        board.appendChild(cell);
      }
    }
  }

  let idx = 0;
  for (let r = 0; r < cfg.rows; r++) {
    for (let c = 0; c < cfg.cols; c++) {
      const cell = board.children[idx++];
      cell.className = 'cell';
      cell.textContent = '';

      if (revealed[r][c]) {
        if (grid[r][c] === -1) {
          cell.className += gameState === 'lost' && !cell.dataset.hit
            ? ' mine-revealed'
            : ' mine-hit';
          cell.textContent = '💣';
        } else {
          cell.className += ' open';
          if (openedSet && openedSet.has(r * cfg.cols + c)) {
            cell.classList.add('opening');
          }
          if (grid[r][c] > 0) {
            cell.textContent = grid[r][c];
            cell.classList.add(`n${grid[r][c]}`);
          }
        }
      } else if (flagged[r][c]) {
        cell.className += ' flagged';
        cell.textContent = '🚩';
      } else {
        cell.className += ' closed';
      }
    }
  }

  // Update mine counter
  let flagCount = 0;
  for (let r = 0; r < cfg.rows; r++)
    for (let c = 0; c < cfg.cols; c++)
      if (flagged[r][c]) flagCount++;
  document.getElementById('mine-count').textContent = cfg.mines - flagCount;
}

// ===================== Event Handlers =====================
function onCellClick(e) {
  if (gameState === 'won' || gameState === 'lost') return;
  const r = +e.currentTarget.dataset.r;
  const c = +e.currentTarget.dataset.c;

  if (flagMode) {
    toggleFlagCell(r, c);
  } else {
    if (revealed[r][c]) {
      chordReveal(r, c);
    } else {
      revealCell(r, c);
    }
  }
}

function onCellRight(e) {
  e.preventDefault();
  if (gameState === 'won' || gameState === 'lost') return;
  const r = +e.currentTarget.dataset.r;
  const c = +e.currentTarget.dataset.c;
  toggleFlagCell(r, c);
}

function onCellMiddle(e) {
  if (e.button !== 1) return;
  e.preventDefault();
  if (gameState === 'won' || gameState === 'lost') return;
  const r = +e.currentTarget.dataset.r;
  const c = +e.currentTarget.dataset.c;
  chordReveal(r, c);
}

function toggleFlagCell(r, c) {
  if (revealed[r][c]) return;
  flagged[r][c] = !flagged[r][c];
  renderBoard();
}

function toggleFlag() {
  flagMode = !flagMode;
  updateModeUI();
}

function updateModeUI() {
  const ind = document.getElementById('mode-indicator');
  const txt = document.getElementById('mode-text');
  if (flagMode) {
    ind.classList.add('flag-mode');
    txt.textContent = 'Flag mode';
  } else {
    ind.classList.remove('flag-mode');
    txt.textContent = 'Open mode';
  }
}

// ===================== Timer =====================
function startTimer() {
  clearInterval(timerInt);
  timerInt = setInterval(() => {
    elapsedSecs++;
    const m = Math.floor(elapsedSecs / 60);
    const s = elapsedSecs % 60;
    document.getElementById('timer').textContent = `${m}:${String(s).padStart(2,'0')}`;
  }, 1000);
}

function stopTimer() { clearInterval(timerInt); }

// ===================== Public API =====================
function setDifficulty(diff) {
  document.querySelectorAll('.btn.diff-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('d-' + diff).classList.add('active');
  init(diff);
}

function newGame() { init(currentDiff); }

// ===================== Keyboard =====================
document.addEventListener('keydown', e => {
  if (e.key === 'f' || e.key === 'F') toggleFlag();
  if (e.key === 'h' || e.key === 'H') getHint();
  if (e.key === 'n' || e.key === 'N') newGame();
});

// ===================== Boot =====================
init('easy');
</script>
